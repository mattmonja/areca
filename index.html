<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ARECA TECH LTD.</title>
  <style>
    :root {
      --base: #232136;
      --surface: #2a273f;
      --overlay: #393552;
      --muted: #6e6a86;
      --subtle: #908caa;
      --text: #e0def4;
      --love: #eb6f92;
      --gold: #f6c177;
      --rose: #ea9a97;
      --pine: #3e8fb0;
      --foam: #9ccfd8;
      --iris: #c4a7e7;
      --highlight-low: #2a283e;
    }

    @font-face {
      font-family: 'BerkeleyMono';
      src: url('fonts/BerkeleyMonoNerdFont-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'BerkeleyMono';
      src: url('fonts/BerkeleyMonoNerdFont-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }

    @font-face {
      font-family: 'BerkeleyMono';
      src: url('fonts/BerkeleyMonoNerdFont-BoldItalic.otf') format('opentype');
      font-weight: 700;
      font-style: italic;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--base);
      color: var(--text);
      font-family: 'BerkeleyMono', 'Courier New', monospace;
      overflow: hidden;
      touch-action: manipulation;
    }

    #scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
      width: 100vw;
      padding: 16px;
    }

    #horse {
      white-space: pre;
      line-height: 1.15;
      letter-spacing: 0.02em;
      color: var(--rose);
      text-align: left;
      margin: 0 auto;
    }

    #brand {
      margin-top: 0.8em;
      font-weight: 700;
      font-style: italic;
      color: var(--love);
      letter-spacing: 0.35em;
      text-align: right;
      user-select: none;
    }

    /* Controls — bottom bar, wraps on mobile */
    #controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--overlay);
      padding: 8px 12px;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px 16px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .slider-name {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      width: 42px;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 60px;
      height: 3px;
      border-radius: 2px;
      background: var(--overlay);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      cursor: pointer;
    }

    .slider-rate .slider-name { color: var(--love); }
    .slider-split .slider-name { color: var(--pine); }
    .slider-noise .slider-name { color: var(--gold); }
    .slider-jitter .slider-name { color: var(--iris); }
    .slider-fuzz .slider-name { color: var(--rose); }
    .slider-decay .slider-name { color: var(--foam); }
    .slider-chain .slider-name { color: #ebbcba; }
    .slider-speed .slider-name { color: var(--rose); }

    .slider-rate input::-webkit-slider-thumb { background: var(--love); }
    .slider-split input::-webkit-slider-thumb { background: var(--pine); }
    .slider-noise input::-webkit-slider-thumb { background: var(--gold); }
    .slider-jitter input::-webkit-slider-thumb { background: var(--iris); }
    .slider-fuzz input::-webkit-slider-thumb { background: var(--rose); }
    .slider-decay input::-webkit-slider-thumb { background: var(--foam); }
    .slider-chain input::-webkit-slider-thumb { background: #ebbcba; }
    .slider-speed input::-webkit-slider-thumb { background: var(--rose); }

    #scene::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    #vignette {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(35, 33, 54, 0.8) 100%);
      pointer-events: none;
      z-index: 9;
    }

    /* Mobile: bigger touch targets, smaller horse */
    @media (max-width: 768px) {
      #scene { padding: 8px 4px; padding-bottom: 80px; }

      input[type="range"] { width: 50px; height: 6px; }
      input[type="range"]::-webkit-slider-thumb { width: 12px; height: 12px; }

      .slider-name { font-size: 8px; width: 36px; }
      #controls { padding: 6px 8px; gap: 4px 10px; }
    }

    @media (max-width: 480px) {
      input[type="range"] { width: 40px; }
      #controls { gap: 3px 8px; }
    }
  </style>
</head>
<body>
  <div id="vignette"></div>
  <div id="scene">
    <div id="horse"></div>
    <div id="brand">A R E C A &nbsp; T E C H &nbsp; L T D .</div>
  </div>

  <div id="controls">
    <div class="slider-row slider-rate"><span class="slider-name">RATE</span><input type="range" min="0" max="100" value="50" id="sl-rate"></div>
    <div class="slider-row slider-split"><span class="slider-name">SPLIT</span><input type="range" min="0" max="100" value="50" id="sl-split"></div>
    <div class="slider-row slider-noise"><span class="slider-name">NOISE</span><input type="range" min="0" max="100" value="30" id="sl-noise"></div>
    <div class="slider-row slider-jitter"><span class="slider-name">JITTER</span><input type="range" min="0" max="100" value="40" id="sl-jitter"></div>
    <div class="slider-row slider-fuzz"><span class="slider-name">FUZZ</span><input type="range" min="0" max="100" value="12" id="sl-fuzz"></div>
    <div class="slider-row slider-decay"><span class="slider-name">DECAY</span><input type="range" min="0" max="100" value="50" id="sl-decay"></div>
    <div class="slider-row slider-chain"><span class="slider-name">CHAIN</span><input type="range" min="0" max="100" value="30" id="sl-chain"></div>
    <div class="slider-row slider-speed"><span class="slider-name">SPEED</span><input type="range" min="0" max="100" value="50" id="sl-speed"></div>
  </div>

  <script>
    let frames = [];
    let similar = {};
    let frameIndex = 0;
    let tick = 0;
    let frameWidth = 110;

    let state = 'calm', stateTTL = 20, aberration = 0, intensity = 0, corruptProb = 0;

    const params = { rate:.5, split:.5, noise:.3, jitter:.4, fuzz:.12, decay:.5, chain:.3, speed:.5 };
    const noiseChars = '!@#$%^&*(){}[]|/<>~`01░▒▓█▀▄═╬╫╪┼┤├';

    function rand(n) { return Math.floor(Math.random() * n); }

    function transition() {
      stateTTL--;
      if (stateTTL <= 0) {
        const r = rand(100);
        switch (state) {
          case 'calm':
            if (r < params.rate * 40) {
              state='burst'; stateTTL=3+rand(10);
              aberration=1+Math.round(params.split*5);
              intensity=Math.max(params.noise,params.jitter);
              corruptProb=Math.round(params.noise*55);
            } else if (r < params.rate * 75) {
              state='micro'; stateTTL=2+rand(6);
              aberration=1+Math.round(params.split*1.5);
              intensity=Math.max(params.noise,params.jitter)*0.4;
              corruptProb=Math.round(params.noise*10);
            } else {
              state='calm'; stateTTL=3+rand(Math.max(1,Math.round((1-params.rate)*25)));
              aberration=0; intensity=0; corruptProb=0;
            } break;
          case 'micro':
            if (r < params.chain*45) {
              state='burst'; stateTTL=3+Math.round(params.decay*8);
              aberration=2+Math.round(params.split*4);
              intensity=Math.max(params.noise,params.jitter);
              corruptProb=Math.round(params.noise*50);
            } else if (r < params.chain*60+30) {
              state='micro'; stateTTL=1+rand(4);
              aberration=1+rand(Math.max(1,Math.round(params.split*3)));
            } else {
              state='calm'; stateTTL=3+rand(Math.max(1,Math.round((1-params.rate)*20)));
              aberration=0; intensity=0; corruptProb=0;
            } break;
          case 'burst':
            state='decay'; stateTTL=2+Math.round(params.decay*10); break;
          case 'decay':
            if (r < params.chain*35) {
              state='burst'; stateTTL=2+Math.round(params.decay*6);
              aberration=1+Math.round(params.split*4);
              intensity=Math.max(params.noise,params.jitter);
              corruptProb=Math.round(params.noise*45);
            } else {
              state='calm'; stateTTL=3+rand(Math.max(1,Math.round((1-params.rate)*15)));
              aberration=0; intensity=0; corruptProb=0;
            } break;
        }
      }
      if (state==='decay') {
        const fade=1-params.decay*0.4;
        if (Math.random()<(1-params.decay)*0.6) aberration=Math.max(0,aberration-1);
        intensity*=fade;
        corruptProb=Math.max(0,corruptProb-Math.round((1-params.decay)*12));
      }
      if (state==='micro') {
        aberration=Math.random()<0.6?1+rand(Math.max(1,Math.round(params.split*2.5))):0;
      }
    }

    function contentBounds(line) {
      let s=-1,e=0;
      for (let i=0;i<line.length;i++) { if(line[i]!==' ') { if(s<0)s=i; e=i+1; } }
      return s>=0?[s,e]:null;
    }

    function fuzzChar(c) {
      if (c===' '||Math.random()>params.fuzz) return c;
      const a=similar[c]; return a&&a.length?a[rand(a.length)]:c;
    }

    function esc(c) {
      if(c==='<')return'&lt;';if(c==='>')return'&gt;';if(c==='&')return'&amp;';return c;
    }

    const C = {
      main:'var(--rose)',white:'var(--text)',red:'var(--love)',
      blue:'var(--pine)',cyan:'var(--foam)',purple:'var(--iris)',noise:'var(--gold)'
    };

    function renderFrame() {
      transition();
      const frame=frames[frameIndex], lines=frame.split('\n');
      const ab=Math.round(aberration*params.split);
      const noise=params.noise, jitter=params.jitter;
      const effI=intensity*Math.max(noise,jitter);
      const effC=Math.round(corruptProb*noise);
      const doF=params.fuzz>0;

      const corruptSet=new Set();
      if(noise>0) for(let i=0;i<Math.round(effI*4);i++) corruptSet.add(rand(lines.length));

      let html='';
      for(let ln=0;ln<lines.length;ln++) {
        let line=lines[ln]; const len=line.length;
        const bounds=contentBounds(line); const has=bounds!==null;
        let cs=bounds?bounds[0]:0, ce=bounds?bounds[1]:0;

        if(has&&jitter>0&&effI>0.1&&Math.random()<jitter*effI*0.4) {
          const content=line.substring(cs,ce);
          const d=rand(Math.max(1,Math.round(jitter*8)+1))-Math.round(jitter*4);
          if(d!==0) {
            const ns=Math.max(0,Math.min(len-content.length,cs+d));
            line=' '.repeat(ns)+content+' '.repeat(Math.max(0,len-ns-content.length));
            const b2=contentBounds(line); if(b2){cs=b2[0];ce=b2[1];}
          }
        }

        const gs=Math.max(0,cs-ab-2), ge=Math.min(len,ce+ab+2);
        const corrupt=corruptSet.has(ln);

        if(ab===0||!has) {
          for(let x=0;x<len;x++) {
            const c=doF&&has?fuzzChar(line[x]):line[x];
            html+=c!==' '?`<span style="color:${C.main}">${esc(c)}</span>`:' ';
          }
        } else {
          for(let x=0;x<gs;x++){const c=doF?fuzzChar(line[x]):line[x];html+=c!==' '?`<span style="color:${C.main}">${esc(c)}</span>`:' ';}
          for(let x=gs;x<ge;x++){
            const rcc=line[x]||' ',cc=doF?fuzzChar(rcc):rcc;
            const lx=x-ab,rx=x+ab;
            const rlc=(lx>=0&&lx<len)?line[lx]:' ',rrc=(rx>=0&&rx<len)?line[rx]:' ';
            const lc=doF?fuzzChar(rlc):rlc,rc=doF?fuzzChar(rrc):rrc;
            const cv=cc!==' ',lv=lc!==' ',rv=rc!==' ';
            const noisy=corrupt&&noise>0&&Math.random()*100<effC&&x>=cs&&x<ce;
            let dc,col;
            if(noisy){dc=noiseChars[rand(noiseChars.length)];col=C.noise;}
            else if(cv){dc=cc;col=cv&&lv&&rv?C.white:cv&&lv?C.main:cv&&rv?C.cyan:C.main;}
            else if(lv){dc=lc;col=rv?C.purple:C.red;}
            else if(rv){dc=rc;col=C.blue;}
            else{html+=' ';continue;}
            html+=`<span style="color:${col}">${esc(dc)}</span>`;
          }
          for(let x=ge;x<len;x++){const c=doF?fuzzChar(line[x]):line[x];html+=c!==' '?`<span style="color:${C.main}">${esc(c)}</span>`:' ';}
        }
        html+='\n';
      }
      document.getElementById('horse').innerHTML=html;
      frameIndex=(frameIndex+1)%frames.length;
      tick++;
    }

    // Fit horse + brand to viewport
    function fitSize() {
      const horse = document.getElementById('horse');
      const brand = document.getElementById('brand');
      const ctrls = document.getElementById('controls');
      const ctrlH = ctrls ? ctrls.offsetHeight : 40;
      const availW = window.innerWidth - 32;
      const availH = window.innerHeight - ctrlH - 48;
      // Each char is roughly 0.6em wide in monospace
      // 110 chars wide, 30 lines tall
      const charRatio = 0.602;  // ch width / line-height adjusted
      const sizeFromW = availW / (frameWidth * charRatio);
      const sizeFromH = availH / (30 * 1.15 + 3);
      const fontSize = Math.max(4, Math.min(16, Math.floor(Math.min(sizeFromW, sizeFromH))));
      horse.style.fontSize = fontSize + 'px';
      brand.style.fontSize = fontSize + 'px';
      brand.style.width = (frameWidth) + 'ch';
    }

    let animInterval = null;
    const paramKeys = ['rate','split','noise','jitter','fuzz','decay','chain','speed'];
    paramKeys.forEach(key => {
      const sl = document.getElementById('sl-' + key);
      sl.addEventListener('input', () => {
        params[key] = sl.value / 100;
        if (key === 'speed') restartTimer();
      });
    });

    function restartTimer() {
      if (animInterval) clearInterval(animInterval);
      const interval = Math.max(40, 200 - params.speed * 160);
      animInterval = setInterval(renderFrame, interval);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        const c = document.getElementById('controls');
        c.style.display = c.style.display === 'none' ? 'flex' : 'none';
        setTimeout(fitSize, 50);
      }
    });

    window.addEventListener('resize', fitSize);

    fetch('horse.json').then(r => r.json()).then(data => {
      frames = data.frames;
      similar = data.similar;
      frameWidth = data.width || 110;
      fitSize();
      restartTimer();
    });
  </script>
</body>
</html>
