<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ARECA TECH LTD.</title>
  <style>
    :root {
      --base: #232136;
      --surface: #2a273f;
      --overlay: #393552;
      --muted: #6e6a86;
      --subtle: #908caa;
      --text: #e0def4;
      --love: #eb6f92;
      --gold: #f6c177;
      --rose: #ea9a97;
      --pine: #3e8fb0;
      --foam: #9ccfd8;
      --iris: #c4a7e7;
      --highlight-low: #2a283e;
    }

    @font-face {
      font-family: 'BerkeleyMono';
      src: url('fonts/BerkeleyMonoNerdFont-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'BerkeleyMono';
      src: url('fonts/BerkeleyMonoNerdFont-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }

    @font-face {
      font-family: 'BerkeleyMono';
      src: url('fonts/BerkeleyMonoNerdFont-BoldItalic.otf') format('opentype');
      font-weight: 700;
      font-style: italic;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--base);
      color: var(--text);
      font-family: 'BerkeleyMono', 'Courier New', monospace;
      overflow: hidden;
      touch-action: manipulation;
    }

    #scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
      width: 100vw;
      padding: 16px;
    }

    #horse {
      white-space: pre;
      line-height: 1.15;
      letter-spacing: 0.02em;
      color: var(--rose);
      text-align: left;
      margin: 0 auto;
    }

    #brand {
      margin-top: 0.8em;
      font-weight: 700;
      font-style: italic;
      color: var(--love);
      letter-spacing: 0.35em;
      text-align: right;
      user-select: none;
    }

    /* Controls — bottom bar, wraps on mobile */
    #controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--overlay);
      padding: 8px 12px;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px 16px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .slider-name {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      width: 42px;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 60px;
      height: 3px;
      border-radius: 2px;
      background: var(--overlay);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      cursor: pointer;
    }

    .slider-rate .slider-name { color: var(--love); }
    .slider-split .slider-name { color: var(--pine); }
    .slider-noise .slider-name { color: var(--gold); }
    .slider-jitter .slider-name { color: var(--iris); }
    .slider-fuzz .slider-name { color: var(--rose); }
    .slider-decay .slider-name { color: var(--foam); }
    .slider-chain .slider-name { color: #ebbcba; }
    .slider-speed .slider-name { color: var(--rose); }

    .slider-rate input::-webkit-slider-thumb { background: var(--love); }
    .slider-split input::-webkit-slider-thumb { background: var(--pine); }
    .slider-noise input::-webkit-slider-thumb { background: var(--gold); }
    .slider-jitter input::-webkit-slider-thumb { background: var(--iris); }
    .slider-fuzz input::-webkit-slider-thumb { background: var(--rose); }
    .slider-decay input::-webkit-slider-thumb { background: var(--foam); }
    .slider-chain input::-webkit-slider-thumb { background: #ebbcba; }
    .slider-speed input::-webkit-slider-thumb { background: var(--rose); }

    #scene::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    #vignette {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(35, 33, 54, 0.8) 100%);
      pointer-events: none;
      z-index: 9;
    }

    /* Mobile: bigger touch targets, smaller horse */
    @media (max-width: 768px) {
      #scene { padding: 8px 4px; padding-bottom: 80px; }

      input[type="range"] { width: 50px; height: 6px; }
      input[type="range"]::-webkit-slider-thumb { width: 12px; height: 12px; }

      .slider-name { font-size: 8px; width: 36px; }
      #controls { padding: 6px 8px; gap: 4px 10px; }
    }

    @media (max-width: 480px) {
      input[type="range"] { width: 40px; }
      #controls { gap: 3px 8px; }
    }
  </style>
</head>
<body>
  <div id="vignette"></div>
  <div id="scene">
    <div id="horse"></div>
    <div id="brand">A R E C A &nbsp; T E C H &nbsp; L T D .</div>
  </div>

  <div id="controls">
    <div class="slider-row slider-rate"><span class="slider-name">RATE</span><input type="range" min="0" max="100" value="50" id="sl-rate"></div>
    <div class="slider-row slider-split"><span class="slider-name">SPLIT</span><input type="range" min="0" max="100" value="50" id="sl-split"></div>
    <div class="slider-row slider-noise"><span class="slider-name">NOISE</span><input type="range" min="0" max="100" value="30" id="sl-noise"></div>
    <div class="slider-row slider-jitter"><span class="slider-name">JITTER</span><input type="range" min="0" max="100" value="40" id="sl-jitter"></div>
    <div class="slider-row slider-fuzz"><span class="slider-name">FUZZ</span><input type="range" min="0" max="100" value="12" id="sl-fuzz"></div>
    <div class="slider-row slider-decay"><span class="slider-name">DECAY</span><input type="range" min="0" max="100" value="50" id="sl-decay"></div>
    <div class="slider-row slider-chain"><span class="slider-name">CHAIN</span><input type="range" min="0" max="100" value="30" id="sl-chain"></div>
    <div class="slider-row slider-speed"><span class="slider-name">SPEED</span><input type="range" min="0" max="100" value="50" id="sl-speed"></div>
  </div>

  <script src="app.min.js"></script>
</body>
</html>
